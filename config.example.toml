[app]
# Optional. Defaults to ${XDG_DATA_HOME:-~/.local/share}/ingest.
data_dir = ""
# IANA timezone used for naive source timestamps and report date boundaries.
timezone = "Asia/Tokyo"

[ui]
# Terminal palette: "default" or "colorful".
theme = "corlorful"
# Controls body-weight direction color only: "loss", "maintenance", or "gain".
body_weight_goal = "maintenance"

[context.activity]
# Defaults favor Suunto for workouts because it has stronger duration,
# distance, heart-rate, energy, and TSS telemetry than mirrored Withings rows.
default = "suunto"

[context.activity.workout]
default = "suunto"
# Hevy is set-level strength detail, not primary workout telemetry.
sets = "hevy"
# Training load metrics come from Suunto TSS.
load = "suunto"

[context.measurement]
# Withings remains the body-composition source. Steps intentionally use
# Vitalsync because Withings step totals have been unreliable.
default = "withings"
steps = "vitalsync"
# Supported: "vitalsync" or "withings".
blood_pressure = "vitalsync"

[context.recovery]
# Vitalsync sleep is closest to Apple Health/Sleep Cycle source data.
default = "vitalsync"
sleep = "vitalsync"

[plugin.hevy]
enabled = true
# Optional. Normalized output path for `ingest import hevy --csv ...`.
workouts_csv = "hevy/workouts.csv"
sets_csv = "hevy/sets.csv"
# Optional. Raw downloaded CSV exports and dedicated browser profile.
raw_dir = "hevy/raw"
browser_dir = "hevy/browser"
login_timeout_seconds = 300
login_poll_interval_seconds = 2

[plugin.suunto]
enabled = true
# Optional. Install and log in to suuntool separately.
# Defaults to `suuntool` from PATH. Set an absolute path when needed.
command = "suuntool"
workouts_csv = "suunto/workouts.csv"
raw_dir = "suunto/raw"
# Number of days to fetch when no local Suunto data exists.
sync_days = 30

[plugin.vitalsync]
enabled = true
# Optional. Apple Health records synced by the Vitalsync iOS app.
endpoint = "https://receiver.example.com/vitalsync/v1"
# Defaults to Sleep Cycle. Set to "" to include all sleep_analysis sources.
source_bundle_id = "com.lexwarelabs.goodmorning"
sleep_csv = "vitalsync/sleep.csv"
steps_csv = "vitalsync/steps.csv"
blood_pressure_csv = "vitalsync/blood_pressure.csv"
raw_dir = "vitalsync/raw"
# Number of days to fetch when no local Vitalsync sleep data exists.
sync_days = 30

[plugin.withings]
enabled = true
# Copy this file to your local config path and replace the placeholder values.
# Store it as ${XDG_CONFIG_HOME:-~/.config}/ingest/config.toml, not in this repository.
# Optional normalized sleep summary output path.
sleep_csv = "withings/sleep.csv"
# Number of days to fetch when no local Withings data exists.
sync_days = 30
