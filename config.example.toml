[app]
# Optional. Defaults to ${XDG_DATA_HOME:-~/.local/share}/ingest.
data_dir = ""
# IANA timezone used for naive source timestamps and report date boundaries.
timezone = "Asia/Tokyo"

[ui]
# Terminal palette: "default" or "colorful".
theme = "default"
# Controls body-weight direction color only: "loss", "maintenance", or "gain".
body_weight_goal = "maintenance"

[withings]
# Copy this file to your local config path and replace the placeholder values.
# Store it as ${XDG_CONFIG_HOME:-~/.config}/ingest.toml, not in this repository.
client_id = ""
client_secret = ""
refresh_token = ""

# Optional fallback for one-off runs when refresh_token is not configured.
access_token = ""
expires_at = 0
# Optional normalized sleep summary output path.
sleep_csv = "withings/sleep.csv"

[sync.withings]
# Number of days to fetch when no local Withings data exists.
days = 30

[hevy]
# Optional. Normalized output path for `ingest import hevy --csv ...`.
workouts_csv = "hevy/workouts.csv"
sets_csv = "hevy/sets.csv"
# Optional. Raw downloaded CSV exports and dedicated browser profile.
raw_dir = "hevy/raw"
browser_dir = "hevy/browser"
login_timeout_seconds = 300

[suunto]
# Optional. Install and log in to suuntool separately, then enable this adapter.
enabled = false
# Defaults to `suuntool` from PATH. Set an absolute path when needed.
command = "suuntool"
workouts_csv = "suunto/workouts.csv"
raw_dir = "suunto/raw"

[sync.suunto]
# Number of days to fetch when no local Suunto data exists.
days = 30

[vitalsync]
# Optional. Apple Health records synced by the Vitalsync iOS app.
enabled = false
base_url = "https://receiver.example.com/vitalsync/v1"
client_id = ""
refresh_token = ""
access_token = ""
expires_at = ""
# Defaults to Sleep Cycle. Set to "" to include all sleep_analysis sources.
source_bundle_id = "com.lexwarelabs.goodmorning"
sleep_csv = "vitalsync/sleep.csv"
raw_dir = "vitalsync/raw"

[sync.vitalsync]
# Number of days to fetch when no local Vitalsync sleep data exists.
days = 30
